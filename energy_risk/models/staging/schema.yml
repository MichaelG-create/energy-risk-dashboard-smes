version: 2

models:
  - name: stg_opsd_prices
    description: "Day-ahead hourly power prices per price zone from OPSD."
    columns:
      - name: ts_utc
        description: "UTC timestamp of the delivery hour."
        tests:
          - not_null

      - name: price_zone
        description: "Price zone or bidding area code (e.g. AT, DE_LU, GB_GBN)."
        tests:
          - not_null

      - name: price_eur_mwh
        description: "Day-ahead price in EUR/MWh."
        tests:
          - not_null
